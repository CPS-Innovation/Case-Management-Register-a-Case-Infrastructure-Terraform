---
trigger:
  branches:
    include:
    - 'main'
  paths:
    include:
    - environments/prod

pr: none

pool: 'CMRC Prod Pool'

jobs:
  - template: templates/terragrunt_job.yml
    parameters:
      environment: prod
      module: applications
      subscription: "Azure Pipeline: CMRC - Prod" #service principal
      runApply: true
      variableGroupName: 'cmrc-infra-vars-prod'

  - template: templates/terragrunt_job.yml
    parameters:
      environment: prod
      module: base
      subscription: "Azure Pipeline: CMRC - Prod" #service principal
      runApply: true
