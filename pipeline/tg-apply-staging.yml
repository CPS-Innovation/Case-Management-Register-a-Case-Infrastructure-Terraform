---
trigger:
  branches:
    include:
    - 'main'
  paths:
    include:
    - environments/staging
    - modules

pr: none

pool: 'CMRC PreProd Pool'

jobs:
  - template: templates/terragrunt_job.yml
    parameters:
      environment: staging
      module: applications
      subscription: "Azure Pipeline: CMRC - Pre-Prod" #service principal
      runApply: true
      variableGroupName: 'cmrc-infra-vars-staging'

  - template: templates/terragrunt_job.yml
    parameters:
      environment: staging
      module: base
      subscription: "Azure Pipeline: CMRC - Pre-Prod" #service principal
      runApply: true
